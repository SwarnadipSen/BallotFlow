# Cloud Build CI/CD Pipeline for BallotFlow
# Builds, pushes to Artifact Registry, and deploys to Cloud Run
#
# Trigger: push to main branch
# Required substitutions (set in Cloud Build trigger):
#   _REGION: e.g. us-central1
#   _SERVICE_NAME: e.g. ballotflow
#   _PROJECT_ID: your GCP project ID

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: ballotflow
  _REPOSITORY: ballotflow-repo

steps:
  # ── Step 1: Run unit tests ──────────────────────────────────────────────────
  - name: "node:20-alpine"
    id: "unit-tests"
    entrypoint: sh
    args:
      - "-c"
      - |
        npm ci && npm test
    env:
      - "NODE_ENV=test"

  # ── Step 2: Build Docker image ──────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    waitFor: ["unit-tests"]
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest"
      - "--cache-from"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest"
      - "--build-arg"
      - "NEXT_PUBLIC_APP_URL=https://${_SERVICE_NAME}-${_PROJECT_ID}.${_REGION}.run.app"
      - "."

  # ── Step 3: Push to Artifact Registry ──────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    waitFor: ["build-image"]
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}"

  # ── Step 4: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-cloud-run"
    waitFor: ["push-image"]
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--concurrency=80"
      - "--timeout=60"
      # Secrets from Secret Manager — never hardcoded
      - "--set-secrets=GEMINI_API_KEY=gemini-api-key:latest"
      - "--set-secrets=FIREBASE_ADMIN_PRIVATE_KEY=firebase-admin-private-key:latest"
      - "--set-secrets=FIREBASE_ADMIN_CLIENT_EMAIL=firebase-admin-client-email:latest"
      # Non-sensitive env vars
      - "--set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1"

# Store build artifacts
artifacts:
  images:
    - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA"

# Build options
options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true

timeout: "1200s"
